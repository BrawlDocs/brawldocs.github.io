<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BrawlDocs</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="A repository of Brawl modding knowledge.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/docsify-plugin-toc@1.3.1/dist/light.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <link rel="stylesheet" href="https://docsify.catppuccin.com/mocha/mauve.css"/>
  <link rel="icon" href="/images/BrawlDocs_Logo.png" type="image/png">
  <style>
    .cover-main .cover-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .cover-main .cover-buttons a,
    .cover-main .cover-button {
      display: inline-block;
      padding: 0.7rem 1.25rem;
      border: 1px solid var(--theme-color, #42b983);
      border-radius: 999px;
      color: var(--theme-color, #42b983);
      text-decoration: none;
      font-weight: 600;
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .cover-main .cover-buttons a:hover,
    .cover-main .cover-buttons a:focus,
    .cover-main .cover-button:hover,
    .cover-main .cover-button:focus {
      background-color: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-color: #fff;
    }

    body {
      padding-top: 0;
    }

    .app-nav {
      position: fixed;
      top: 0;
      left: 10;
      right: 0;
      z-index: 1;
      padding: 0rem 1rem 0rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(17, 17, 24, 0.95);
      backdrop-filter: blur(8px);
      margin-bottom: 0;
      text-align: left;
      line-height: 1.2;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      min-height: 2.2rem;
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s ease;
    }

    .app-nav.visible {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }

    .app-nav a {
      margin: 0;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      color: #e8defc;
      font-weight: 600;
      transition: background-color 0.2s ease, color 0.2s ease;
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
    }

    .app-nav a:hover,
    .app-nav a:focus {
      background-color: rgba(180, 140, 255, 0.18);
      color: #fff;
      text-decoration: none;
    }

    .sidebar .app-name img,
    .sidebar img[src*="BrawlDocs_Logo"] {
      max-width: 70%;
      width: 70%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .toc-toggle {
      display: none;
    }

    @media (max-width: 1299px) {
      .app-nav {
        padding-top: 0.4rem;
        padding-bottom: 0.5rem;
      }

      .content {
        padding-top: 4rem !important;
      }

      aside.toc-nav {
        max-width: 0 !important;
        width: 0 !important;
        opacity: 0 !important;
        pointer-events: none !important;
        overflow: hidden !important;
      }

      aside.toc-nav.open {
        max-width: min(18rem, calc(100vw - 1.5rem)) !important;
        width: min(18rem, calc(100vw - 1.5rem)) !important;
        opacity: 1 !important;
        pointer-events: auto !important;
        overflow-y: auto !important;
      }

      .toc-toggle {
        display: inline-flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 0.2rem;
        position: fixed;
        top: 0.6rem;
        right: 0.75rem;
        z-index: 120;
        width: 2.35rem;
        height: 2.35rem;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        background: rgba(17, 17, 24, 0.95);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        cursor: pointer;
      }

      .toc-toggle span {
        display: block;
        width: 1rem;
        height: 2px;
        border-radius: 999px;
        background: #e8defc;
      }

      .toc-toggle.active span:nth-child(1) {
        transform: rotate(45deg) translate(0.12rem, 0.17rem);
      }

      .toc-toggle.active span:nth-child(2) {
        opacity: 0;
      }

      .toc-toggle.active span:nth-child(3) {
        transform: rotate(-45deg) translate(0.12rem, -0.17rem);
      }

      aside.toc-nav {
        position: fixed;
        top: 3.2rem;
        right: 0.75rem;
        width: min(18rem, calc(100vw - 1.5rem));
        max-width: min(18rem, calc(100vw - 1.5rem));
        max-height: 70vh;
        overflow-y: auto;
        padding: 0;
        margin: 0;
        border: 0;
        background: transparent;
        opacity: 0;
        pointer-events: none;
        transform: translateY(-0.4rem);
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      aside.toc-nav.open {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
        padding: 0.75rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 0.8rem;
        background: rgba(17, 17, 24, 0.97);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      aside.toc-nav .page_toc {
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'BrawlDocs',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 0,
      auto2top: true,
      loadNavbar: true,
      coverpage: true,
      onlyCover: true,
      logo: 'images/BrawlDocs_Logo_Text.png',
      plugins: [
        function (hook) {
          function updateNavbarVisibility() {
            const nav = document.querySelector('.app-nav');
            if (!nav) return;

            const isCoverPage = !window.location.hash || window.location.hash === '#' || window.location.hash === '#/' || window.location.hash === '#/README';
            if (isCoverPage) {
              nav.classList.remove('visible');
            } else {
              nav.classList.add('visible');
            }
          }

          function setupMobileToc() {
            const toc = document.querySelector('aside.toc-nav');
            if (!toc) return;

            let button = document.querySelector('.toc-toggle');
            if (!button) {
              button = document.createElement('button');
              button.type = 'button';
              button.className = 'toc-toggle';
              button.setAttribute('aria-label', 'Toggle table of contents');
              button.innerHTML = '<span></span><span></span><span></span>';
              button.addEventListener('click', () => {
                const isOpen = toc.classList.toggle('open');
                button.classList.toggle('active', isOpen);
              });
              document.body.appendChild(button);
            }

            const hasMeaningfulToc = toc.querySelectorAll('.page_toc a').length > 1;
            const isMobile = window.innerWidth <= 1299;
            if (isMobile && hasMeaningfulToc) {
              button.style.display = 'inline-flex';
              toc.classList.remove('open');
              button.classList.remove('active');
            } else {
              button.style.display = 'none';
              toc.classList.remove('open');
              button.classList.remove('active');
            }
          }

          hook.ready(function () {
            setTimeout(updateNavbarVisibility, 0);
            setTimeout(setupMobileToc, 0);
          });

          hook.mounted(function () {
            updateNavbarVisibility();
            setupMobileToc();
          });

          hook.doneEach(function () {
            updateNavbarVisibility();
            setTimeout(setupMobileToc, 0);
          });

          window.addEventListener('resize', setupMobileToc);
        }
      ],
      toc: {
        tocMaxLevel: 5,
        target: 'h1, h2, h3',
        ignoreHeaders:  ['<!-- {docsify-ignore} -->', '<!-- {docsify-ignore-all} -->']
      }
    }
  </script>
  <script src="https://unpkg.com/docsify-plugin-toc@1.3.1/dist/docsify-plugin-toc.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
