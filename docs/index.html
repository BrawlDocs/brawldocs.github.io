<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BrawlDocs</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="A repository of Brawl modding knowledge.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/docsify-plugin-toc@1.3.1/dist/light.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <link rel="stylesheet" href="https://docsify.catppuccin.com/mocha/mauve.css"/>
  <link rel="icon" href="/images/BrawlDocs_Logo.png" type="image/png">
  <style>
    .cover-main .cover-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .cover-main .cover-buttons a,
    .cover-main .cover-button {
      display: inline-block;
      padding: 0.7rem 1.25rem;
      border: 1px solid var(--theme-color, #42b983);
      border-radius: 999px;
      color: var(--theme-color, #42b983);
      text-decoration: none;
      font-weight: 600;
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .cover-main .cover-buttons a:hover,
    .cover-main .cover-buttons a:focus,
    .cover-main .cover-button:hover,
    .cover-main .cover-button:focus {
      background-color: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-color: #fff;
    }

    body {
      padding-top: 0;
    }

    .app-nav {
      position: fixed;
      top: 0;
      left: 10;
      right: 0;
      z-index: 1;
      padding: 0rem 1rem 0rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(17, 17, 24, 0.95);
      backdrop-filter: blur(8px);
      margin-bottom: 0;
      text-align: left;
      line-height: 1.2;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      min-height: 2.2rem;
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s ease;
    }

    .app-nav.visible {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }

    .app-nav a {
      margin: 0;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      color: #e8defc;
      font-weight: 600;
      transition: background-color 0.2s ease, color 0.2s ease;
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
    }

    .app-nav a:hover,
    .app-nav a:focus {
      background-color: rgba(180, 140, 255, 0.18);
      color: #fff;
      text-decoration: none;
    }

    .sidebar .app-name img,
    .sidebar img[src*="BrawlDocs_Logo"] {
      max-width: 70%;
      width: 70%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    @media (max-width: 768px) {
      .app-nav {
        padding-top: 0.4rem;
        padding-bottom: 0.5rem;
      }

      .content {
        padding-top: 5rem !important;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'BrawlDocs',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 0,
      auto2top: true,
      loadNavbar: true,
      coverpage: true,
      onlyCover: true,
      logo: 'images/BrawlDocs_Logo_Text.png',
      plugins: [
        function (hook) {
          function updateNavbarVisibility() {
            const nav = document.querySelector('.app-nav');
            if (!nav) return;

            const isCoverPage = !window.location.hash || window.location.hash === '#' || window.location.hash === '#/' || window.location.hash === '#/README';
            if (isCoverPage) {
              nav.classList.remove('visible');
            } else {
              nav.classList.add('visible');
            }
          }

          hook.ready(function () {
            setTimeout(updateNavbarVisibility, 0);
          });

          hook.mounted(updateNavbarVisibility);
          hook.doneEach(updateNavbarVisibility);
        }
      ],
      toc: {
        tocMaxLevel: 5,
        target: 'h2, h3, h4, h5, h6',
        ignoreHeaders:  ['<!-- {docsify-ignore} -->', '<!-- {docsify-ignore-all} -->']
      }
    }
  </script>
  <script src="https://unpkg.com/docsify-plugin-toc@1.3.1/dist/docsify-plugin-toc.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
